<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Krystal Attendance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <main class="login-card">
            <div class="brand">
                <img src="assets/images/krystal-logo.png" alt="Krystal Logo" class="brand-logo">
                KRYSTAL
            </div>
            <p class="login-subtitle">Attendance Management System</p>

            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div style="position: relative;">
                        <i class="fa-regular fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="text" id="username" class="form-control" placeholder="admin@morning" required style="padding-left: 2.5rem;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required style="padding-left: 2.5rem;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-2">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </form>

            <div class="mt-4" style="font-size: 0.75rem; color: var(--text-muted);">
                <p>Demo Accounts:</p>
                <p>admin@morning | admin@afternoon | admin@night | admin@krystal</p>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
