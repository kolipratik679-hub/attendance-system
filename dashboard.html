<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Krystal Attendance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="container header-content">
            <a href="dashboard.html" class="brand">
                <img src="assets/images/krystal-logo.png" alt="Krystal Logo" class="brand-logo">
                <span style="display: none; @media (min-width: 640px) { display: inline; }">KRYSTAL ATTENDANCE</span>
            </a>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span class="shift-badge">Morning Shift</span>
                <a href="index.html" class="btn btn-outline btn-sm" title="Logout">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="action-bar">
            <div class="action-bar-left">
                <div style="position: relative;">
                    <i class="fa-regular fa-calendar" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="date" class="form-control" style="padding-left: 2.5rem; width: 200px;">
                </div>
            </div>
            <div class="action-bar-right">
                <a href="add-attendance.html" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Add New Attendance
                </a>
            </div>
        </div>

        <section class="card">
            <header class="card-header">
                <h3>Saved Attendance Records</h3>
            </header>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th style="width: 200px; text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <strong>Oct 24, 2023</strong>
                                <div style="font-size: 0.85rem; color: var(--text-muted);"><i class="fa-solid fa-users"></i> 45 Staff Present</div>
                            </td>
                            <td style="text-align: right;">
                                <div class="flex justify-end gap-2">
                                    <a href="add-attendance.html" class="btn btn-outline btn-icon" title="Edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <button class="btn btn-outline btn-icon" title="Download CSV">
                                        <i class="fa-solid fa-file-csv"></i>
                                    </button>
                                    <button class="btn btn-danger btn-icon" title="Delete">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <strong>Oct 23, 2023</strong>
                                <div style="font-size: 0.85rem; color: var(--text-muted);"><i class="fa-solid fa-users"></i> 42 Staff Present</div>
                            </td>
                            <td style="text-align: right;">
                                <div class="flex justify-end gap-2">
                                    <a href="add-attendance.html" class="btn btn-outline btn-icon" title="Edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <button class="btn btn-outline btn-icon" title="Download CSV">
                                        <i class="fa-solid fa-file-csv"></i>
                                    </button>
                                    <button class="btn btn-danger btn-icon" title="Delete">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <strong>Oct 22, 2023</strong>
                                <div style="font-size: 0.85rem; color: var(--text-muted);"><i class="fa-solid fa-users"></i> 44 Staff Present</div>
                            </td>
                            <td style="text-align: right;">
                                <div class="flex justify-end gap-2">
                                    <a href="add-attendance.html" class="btn btn-outline btn-icon" title="Edit">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <button class="btn btn-outline btn-icon" title="Download CSV">
                                        <i class="fa-solid fa-file-csv"></i>
                                    </button>
                                    <button class="btn btn-danger btn-icon" title="Delete">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
